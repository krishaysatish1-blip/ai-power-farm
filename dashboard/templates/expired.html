<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jarvis — Access Expired</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a2e;color:#e0e0e0;height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#16213e;border:1px solid #2a2a3e;border-radius:16px;padding:48px;width:420px;max-width:90vw;text-align:center}
.icon{font-size:48px;margin-bottom:16px}
.card h1{font-size:24px;font-weight:700;margin-bottom:8px;letter-spacing:-1px}
.card p{font-size:14px;color:#7a7a8a;line-height:1.6;margin-bottom:24px}
.highlight{background:#7c3aed;padding:20px;border-radius:12px;margin-bottom:24px}
.highlight h2{font-size:20px;margin-bottom:4px}
.highlight p{color:#c4b5fd;font-size:13px}
.ref-code{background:#1e1e3a;padding:12px;border-radius:8px;font-family:monospace;font-size:16px;letter-spacing:1px;margin:12px 0;border:1px solid #2a2a3e;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.ref-code:hover{border-color:#7c3aed}
.copy{font-size:11px;color:#a855f7;background:none;border:none;cursor:pointer}
.btn{display:inline-block;padding:10px 24px;background:#7c3aed;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;text-decoration:none;transition:all .2s;margin:4px}
.btn:hover{background:#a855f7}
.btn.outline{background:transparent;border:1px solid #7c3aed;color:#a855f7}
.btn.outline:hover{background:#7c3aed;color:#fff}
</style>
</head>
<body>
<div class="card">
  <div class="icon">⏱</div>
  <h1>Access Expired</h1>
  <p>Your free trial has ended. Refer a friend to get 10 more days — for free.</p>
  <div class="highlight">
    <h2>Give 10 days, get 10 days</h2>
    <p>Share your referral code. Every friend who signs up extends both your access.</p>
    <div class="ref-code" onclick="copyCode()">
      <span id="code">Loading...</span>
      <button class="copy">Copy</button>
    </div>
  </div>
  <a href="/" class="btn">Try Again</a>
  <a href="/logout" class="btn outline">Sign Out</a>
</div>
<script>
fetch('/api/referral').then(r=>r.json()).then(d=>{
  if(d.referral_code)document.getElementById('code').textContent=d.referral_code;
});
function copyCode(){
  navigator.clipboard.writeText(document.getElementById('code').textContent);
}
</script>
</body>
</html>

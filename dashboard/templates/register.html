<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jarvis — Sign Up</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a2e;color:#e0e0e0;height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#16213e;border:1px solid #2a2a3e;border-radius:16px;padding:40px;width:380px;max-width:90vw}
.card h1{font-size:24px;font-weight:700;text-align:center;margin-bottom:4px;letter-spacing:-1px}
.card .sub{text-align:center;font-size:13px;color:#7a7a8a;margin-bottom:28px}
.field{margin-bottom:16px}
.field label{display:block;font-size:12px;color:#7a7a8a;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.field input{width:100%;padding:10px 14px;background:#1e1e3a;border:1px solid #2a2a3e;border-radius:8px;color:#e0e0e0;font-size:14px;outline:none;transition:border .2s}
.field input:focus{border-color:#7c3aed}
.btn{width:100%;padding:10px;background:#7c3aed;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;margin-top:8px;transition:all .2s}
.btn:hover{background:#a855f7}
.footer{text-align:center;margin-top:20px;font-size:13px;color:#7a7a8a}
.footer a{color:#a855f7;text-decoration:none}
.error{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:#fca5a5;padding:8px 12px;border-radius:8px;font-size:13px;margin-bottom:16px;text-align:center}
.success{background:rgba(34,197,94,.15);border:1px solid rgba(34,197,94,.3);color:#86efac;padding:8px 12px;border-radius:8px;font-size:13px;margin-bottom:16px;text-align:center}
</style>
</head>
<body>
<div class="card">
  <h1>Jarvis</h1>
  <p class="sub">Create your account — free 10 days included</p>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  {% if success %}<div class="success">{{ success }}</div>{% endif %}
  <form method="POST">
    <div class="field">
      <label>Username</label>
      <input name="username" minlength="3" required autofocus>
    </div>
    <div class="field">
      <label>Email</label>
      <input name="email" type="email" required>
    </div>
    <div class="field">
      <label>Password</label>
      <input name="password" type="password" minlength="6" required>
    </div>
    <div class="field">
      <label>Referral Code (optional)</label>
      <input name="referral_code" placeholder="JARVIS..." value="{{ request.args.get('ref','') }}">
    </div>
    <button class="btn" type="submit">Create Account</button>
  </form>
  <div class="footer">Already have an account? <a href="/login">Sign in</a></div>
</div>
</body>
</html>

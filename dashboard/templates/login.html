<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jarvis — Sign In</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1a2e;color:#e0e0e0;height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#16213e;border:1px solid #2a2a3e;border-radius:16px;padding:40px;width:380px;max-width:90vw}
.card h1{font-size:24px;font-weight:700;text-align:center;margin-bottom:4px;letter-spacing:-1px}
.card .sub{text-align:center;font-size:13px;color:#7a7a8a;margin-bottom:28px}
.field{margin-bottom:16px}
.field label{display:block;font-size:12px;color:#7a7a8a;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.field input{width:100%;padding:10px 14px;background:#1e1e3a;border:1px solid #2a2a3e;border-radius:8px;color:#e0e0e0;font-size:14px;outline:none;transition:border .2s}
.field input:focus{border-color:#7c3aed}
.btn{width:100%;padding:10px;background:#7c3aed;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;margin-top:8px;transition:all .2s}
.btn:hover{background:#a855f7}
.google-btn{width:100%;padding:10px;background:#fff;color:#333;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;margin-top:12px;display:flex;align-items:center;justify-content:center;gap:8px}
.google-btn:hover{background:#f5f5f5}
.sep{text-align:center;color:#7a7a8a;font-size:12px;margin:16px 0;position:relative}
.sep::before,.sep::after{content:'';position:absolute;top:50%;width:40%;height:1px;background:#2a2a3e}
.sep::before{left:0}.sep::after{right:0}
.footer{text-align:center;margin-top:20px;font-size:13px;color:#7a7a8a}
.footer a{color:#a855f7;text-decoration:none}
.error{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.3);color:#fca5a5;padding:8px 12px;border-radius:8px;font-size:13px;margin-bottom:16px;text-align:center}
</style>
</head>
<body>
<div class="card">
  <h1>Jarvis</h1>
  <p class="sub">Sign in to your account</p>
  {% if error %}<div class="error">{{ error }}</div>{% endif %}
  <form method="POST">
    <div class="field">
      <label>Username</label>
      <input name="username" autocomplete="username" required autofocus>
    </div>
    <div class="field">
      <label>Password</label>
      <input name="password" type="password" autocomplete="current-password" required>
    </div>
    <button class="btn" type="submit">Sign In</button>
  </form>
  <div class="sep">or</div>
  <a href="/auth/google"><button class="google-btn">
    <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
    Continue with Google
  </button></a>
  <div class="footer">Don't have an account? <a href="/register">Sign up</a></div>
</div>
</body>
</html>

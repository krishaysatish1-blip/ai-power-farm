<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Power Farm - AI Assistant</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0a0a0f;color:#e0e0e0;min-height:100vh;display:flex;flex-direction:column}
.topbar{background:#12121a;border-bottom:1px solid #1e1e2e;padding:12px 24px;display:flex;justify-content:space-between;align-items:center}
.topbar h1{font-size:18px;background:linear-gradient(135deg,#00d4ff,#7b2fff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:700}
.topbar-right{display:flex;align-items:center;gap:16px}
.topbar-right span{color:#888;font-size:13px}
.logout-btn{background:#2d1b1b;border:1px solid #ff4444;color:#ff6666;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:12px;text-decoration:none}
.chat-container{flex:1;display:flex;flex-direction:column;max-width:800px;margin:0 auto;width:100%;padding:20px}
.chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
.chat-msg{max-width:80%;padding:12px 16px;border-radius:12px;font-size:14px;line-height:1.6}
.chat-msg.user{align-self:flex-end;background:linear-gradient(135deg,#7b2fff,#00d4ff);color:#fff;border-bottom-right-radius:4px}
.chat-msg.ai{align-self:flex-start;background:#1a1a2e;border:1px solid #2a2a3e;border-bottom-left-radius:4px}
.chat-msg.ai .typing{display:inline-flex;gap:4px}
.chat-msg.ai .typing span{width:6px;height:6px;background:#7b2fff;border-radius:50%;animation:typing 1.4s infinite}
.chat-msg.ai .typing span:nth-child(2){animation-delay:0.2s}
.chat-msg.ai .typing span:nth-child(3){animation-delay:0.4s}
@keyframes typing{0%,60%,100%{opacity:0.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-4px)}}
.chat-input-row{display:flex;gap:10px;padding:16px 0;border-top:1px solid #1e1e2e}
.chat-input-row input{flex:1;padding:12px 16px;background:#12121a;border:1px solid #2a2a3a;border-radius:10px;color:#fff;font-size:14px;outline:none;transition:border .2s}
.chat-input-row input:focus{border-color:#7b2fff}
.chat-input-row button{padding:12px 24px;background:linear-gradient(135deg,#7b2fff,#00d4ff);border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;transition:opacity .2s}
.chat-input-row button:hover{opacity:0.9}
.welcome{text-align:center;color:#666;padding:40px 20px;font-size:14px;line-height:1.6}
.welcome h2{color:#00d4ff;margin-bottom:8px;font-size:20px}
.history-btn{background:#1a1a2e;border:1px solid #2a2a3e;color:#888;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12px}
.history-btn:hover{border-color:#7b2fff;color:#7b2fff}
.conversations{max-height:200px;overflow-y:auto;margin-bottom:16px;border:1px solid #1e1e2e;border-radius:8px}
.conv-item{padding:10px 14px;border-bottom:1px solid #1a1a2a;cursor:pointer;font-size:13px;color:#888}
.conv-item:hover{background:#12121a;color:#e0e0e0}
.conv-item.active{background:#1a1a2e;color:#7b2fff}
.new-conv{padding:10px 14px;color:#7b2fff;cursor:pointer;font-size:13px;border-bottom:1px solid #1e1e2e}
.new-conv:hover{background:#12121a}
</style>
</head>
<body>
<div class="topbar">
<h1>AI POWER FARM</h1>
<div class="topbar-right">
<span>Welcome, <strong>{{ username }}</strong></span>
<a href="/logout" class="logout-btn">Sign Out</a>
</div>
</div>

<div class="chat-container">
<div class="tabs">
<div class="tab active" onclick="showTab('chat')">AI Chat</div>
<div class="tab" onclick="showTab('files')">Files</div>
</div>

<div id="chat-tab">
<div class="conversations" id="conversations">
<div class="new-conv" onclick="newConversation()">+ New Conversation</div>
</div>

<div class="chat-messages" id="chat-messages">
<div class="welcome">
<h2>AI Assistant</h2>
<p>Ask me anything. I'm here to help with work, research, or just conversation.</p>
</div>
</div>

<div class="chat-input-row">
<input type="text" id="chat-input" placeholder="Type your message..." onkeydown="if(event.key==='Enter')sendChat()">
<button onclick="sendChat()">Send</button>
</div>
</div>

<div id="files-tab" style="display:none">
<div class="file-manager">
<div class="file-toolbar">
<input type="text" id="file-path" placeholder="Enter path..." value="">
<button onclick="loadFiles()">Go</button>
<button onclick="createFolder()">New Folder</button>
</div>
<div class="file-list" id="file-list">
<div class="welcome"><p>Select a folder to browse files</p></div>
</div>
</div>
</div>
</div>

<script>
let conversations = JSON.parse(localStorage.getItem('ai_conversations') || '{}');
let currentConv = null;

function newConversation() {
    currentConv = Date.now().toString();
    conversations[currentConv] = [];
    localStorage.setItem('ai_conversations', JSON.stringify(conversations));
    renderConversations();
    document.getElementById('chat-messages').innerHTML = '<div class="welcome"><h2>AI Assistant</h2><p>Ask me anything.</p></div>';
}

function switchConversation(id) {
    currentConv = id;
    renderConversations();
    renderMessages();
}

function renderConversations() {
    const el = document.getElementById('conversations');
    let html = '<div class="new-conv" onclick="newConversation()">+ New Conversation</div>';
    const sorted = Object.entries(conversations).sort((a,b) => b[0] - a[0]);
    for (const [id, msgs] of sorted) {
        const firstMsg = msgs.length > 0 ? msgs[0].content.substring(0, 40) : 'New conversation';
        const active = id === currentConv ? 'active' : '';
        html += `<div class="conv-item ${active}" onclick="switchConversation('${id}')">${firstMsg}...</div>`;
    }
    el.innerHTML = html;
}

function renderMessages() {
    if (!currentConv || !conversations[currentConv]) return;
    const msgs = conversations[currentConv];
    const el = document.getElementById('chat-messages');
    if (msgs.length === 0) {
        el.innerHTML = '<div class="welcome"><h2>AI Assistant</h2><p>Ask me anything.</p></div>';
        return;
    }
    el.innerHTML = msgs.map(m => 
        `<div class="chat-msg ${m.role}">${escHtml(m.content)}</div>`
    ).join('');
    el.scrollTop = el.scrollHeight;
}

async function sendChat() {
    const input = document.getElementById('chat-input');
    const msg = input.value.trim();
    if (!msg) return;
    input.value('');
    
    if (!currentConv) newConversation();
    
    const el = document.getElementById('chat-messages');
    const welcome = el.querySelector('.welcome');
    if (welcome) welcome.remove();
    
    el.innerHTML += `<div class="chat-msg user">${escHtml(msg)}</div>`;
    el.innerHTML += `<div class="chat-msg ai" id="typing"><div class="typing"><span></span><span></span><span></span></div></div>`;
    el.scrollTop = el.scrollHeight;
    
    conversations[currentConv].push({role:'user', content:msg});
    
    try {
        const r = await fetch('/api/ai/chat', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({message:msg})});
        const d = await r.json();
        document.getElementById('typing').remove();
        const reply = d.reply || d.error;
        el.innerHTML += `<div class="chat-msg ai">${escHtml(reply)}</div>`;
        conversations[currentConv].push({role:'assistant', content:reply});
        localStorage.setItem('ai_conversations', JSON.stringify(conversations));
        el.scrollTop = el.scrollHeight;
    } catch(e) {
        document.getElementById('typing').remove();
        el.innerHTML += `<div class="chat-msg ai" style="color:#ff4444">Connection error. Please try again.</div>`;
    }
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }

renderConversations();
if (Object.keys(conversations).length > 0) {
    currentConv = Object.keys(conversations).sort().pop();
    renderMessages();
}
</script>
</body>
</html>
